name: Build MultiLink Server

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        run: choco install wixtoolset

      - name: Build Release
        working-directory: ./link
        run: cargo build --release

      - name: Build MSI Installer
        working-directory: ./link/wix
        run: |
          candle main.wxs -ext WixUIExtension
          light main.wixobj -o MultiLinkServer.msi -ext WixUIExtension

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: MultiLinkServer-windows
          path: link/wix/MultiLinkServer.msi

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: MultiLinkServer-windows-exe
          path: link/target/release/MultiLinkServer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build x86_64
        working-directory: ./link
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        working-directory: ./link
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Universal Binary
        working-directory: ./link
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/MultiLinkServer \
            target/aarch64-apple-darwin/release/MultiLinkServer \
            -output MultiLinkServer-universal

      - name: Create App Bundle
        working-directory: ./link
        run: |
          mkdir -p MultiLinkServer.app/Contents/MacOS
          mkdir -p MultiLinkServer.app/Contents/Resources
          cp MultiLinkServer-universal MultiLinkServer.app/Contents/MacOS/MultiLinkServer
          chmod +x MultiLinkServer.app/Contents/MacOS/MultiLinkServer
          cat > MultiLinkServer.app/Contents/Info.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>MultiLinkServer</string>
              <key>CFBundleIdentifier</key>
              <string>com.multilink.server</string>
              <key>CFBundleName</key>
              <string>MultiLinkServer</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>0.1.0</string>
              <key>LSUIElement</key>
              <true/>
          </dict>
          </plist>
          PLISTEOF

      - name: Create DMG
        working-directory: ./link
        run: |
          hdiutil create -volname "MultiLinkServer" -srcfolder MultiLinkServer.app -ov -format UDZO MultiLinkServer-universal.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MultiLinkServer-macos-universal
          path: link/MultiLinkServer-universal.dmg

  build-linux:
    runs-on: ubuntu-22.04
    container: ubuntu:20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          # Step 1: install ca-certificates from default sources first
          apt-get update -qq
          apt-get install -y ca-certificates
          # Step 2: switch to June 2022 snapshot (webkit2gtk 2.36.x, has set_enable_webgl)
          cat > /etc/apt/sources.list << 'EOF'
deb https://snapshot.ubuntu.com/ubuntu/20220601T000000Z focal main restricted universe multiverse
deb https://snapshot.ubuntu.com/ubuntu/20220601T000000Z focal-updates main restricted universe multiverse
deb https://snapshot.ubuntu.com/ubuntu/20220601T000000Z focal-security main restricted universe multiverse
EOF
          apt-get -o Acquire::Check-Valid-Until=false update
          apt-get install -y curl build-essential \
            libx11-dev libxtst-dev \
            libglib2.0-dev libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        working-directory: ./link
        run: cargo build --release

      - name: Package tar.gz
        working-directory: ./link
        run: |
          mkdir -p dist
          cp target/release/MultiLinkServer dist/
          tar -czf MultiLinkServer-linux-x86_64.tar.gz -C dist MultiLinkServer

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: MultiLinkServer-linux-x86_64
          path: link/MultiLinkServer-linux-x86_64.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.msi
            **/*.dmg
            **/*.exe
            **/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
